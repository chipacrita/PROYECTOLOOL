<h1>Contactos</h1>
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto - Rayos X Kawaii</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive;
            background: linear-gradient(to right, #ffe4ec, #e0f7ff);
            margin: 0;
            padding: 0;
        }

        .contenedor {
            width: 400px;
            margin: 50px auto;
            background: #ffffffcc;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 0 15px #ffb6c1;
            text-align: center;
        }

        h2 {
            color: #ff69b4;
        }

        .mascota {
            font-size: 50px;
        }

        input, textarea {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #ffb6c1;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: #ff69b4;
            box-shadow: 0 0 5px #ff69b4;
        }

        button {
            background: #ff69b4;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #ff1493;
        }

        .footer {
            margin-top: 10px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
    <nav>
        <ul> <a href="index.html">Home</a></ul>
        <ul> <a href="contactos.html">Contactos </a></ul>
        <ul>Acerca</ul>
    </nav>
<div class="contenedor">
    <div class="mascota">🐰✨</div>
    <h2>Centro de Rayos X Kawaii 💖</h2>
    <p>¡Hola! Envíanos tu mensajito ✉️</p>

    <form action="#" method="POST">
        <input type="text" name="nombre" placeholder="Tu nombre kawaii 🌸" required>
        <input type="email" name="email" placeholder="Tu correo 💌" required>
        <textarea name="mensaje" rows="4" placeholder="Escribe tu mensaje uwu 📝" required></textarea>
        <button type="submit">Enviar 💕</button>
    </form>

    <div class="footer">
        🩺 Rayos X con amor y cuidado ✨
    </div>
</div>

</body>
</html>
